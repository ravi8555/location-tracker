    <script>
        const AUTH_SERVER = 'http://localhost:8000';
        const TRACKER_SERVER = 'http://localhost:8001';
        
        let token = null;
        let socket = null;
        let map = null;
        let myMarker = null;
        let userMarkers = new Map(); // userId -> marker
        let locationInterval = null;
        let currentUser = null;
        
        // Show signup form
        window.showSignup = () => {
            const container = document.getElementById('authContainer');
            container.innerHTML = `
                <div class="login-card">
                    <h2>Create Account</h2>
                    <input type="text" id="firstName" placeholder="First Name" />
                    <input type="text" id="lastName" placeholder="Last Name" />
                    <input type="email" id="signupEmail" placeholder="Email" />
                    <input type="password" id="signupPassword" placeholder="Password (min 8 chars)" />
                    <button onclick="signup()">Sign Up</button>
                    <div id="signupError" class="error"></div>
                    <p style="margin-top: 15px; font-size: 12px;">
                        <a href="#" onclick="location.reload()">Back to Sign In</a>
                    </p>
                </div>
            `;
        };
        
        // Signup function
        window.signup = async () => {
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const errorDiv = document.getElementById('signupError');
            
            try {
                const response = await fetch(`${AUTH_SERVER}/o/authenticate/sign-up`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, email, password })
                });
                
                if (response.ok) {
                    alert('Account created! Please sign in.');
                    location.reload();
                } else {
                    const data = await response.json();
                    errorDiv.textContent = data.message || 'Signup failed';
                }
            } catch (error) {
                errorDiv.textContent = 'Network error. Please try again.';
            }
        };
        
        // Login function
        window.login = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            
            if (!email || !password) {
                errorDiv.textContent = 'Please enter email and password';
                return;
            }
            
            errorDiv.textContent = '';
            
            try {
                const response = await fetch(`${AUTH_SERVER}/o/authenticate/sign-in`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.message || 'Login failed');
                }
                
                const data = await response.json();
                token = data.token;
                
                // Decode token to get user info
                const payload = JSON.parse(atob(token.split('.')[1]));
                currentUser = {
                    userId: payload.sub,
                    email: payload.email,
                    name: payload.name,
                    picture: payload.picture
                };
                
                // Initialize app after successful login
                initApp();
                
            } catch (error) {
                errorDiv.textContent = error.message;
            }
        };
        
        // Initialize the main application
        async function initApp() {
            // Hide auth container, show app container
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            
            // Display user info
            document.getElementById('userInfo').innerHTML = `
                <strong>${currentUser.name || currentUser.email}</strong>
                <button class="logout-btn" onclick="logout()">Logout</button>
            `;
            
            // Initialize map
            map = L.map('map').setView([51.505, -0.09], 13);

                maxZoom: 19,
                attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            }).addTo(map);
            
            // Connect to socket server with authentication
            connectSocket();
            
            // Start location tracking
            startLocationTracking();
        }
        
        function connectSocket() {
            socket = io(TRACKER_SERVER, {
                auth: { token: token },
                transports: ['websocket', 'polling']
            });
            
            socket.on('connect', () => {
                console.log('Connected to tracker server');
                updateStatus('Connected - Sharing location');
            });
            
            socket.on('disconnect', () => {
                console.log('Disconnected from tracker server');
                updateStatus('Disconnected - Attempting to reconnect...');
            });
            
            // Handle location updates from other users
            socket.on('server:location:update', (data) => {
                console.log('Location update received:', data);
                updateUserMarker(data);
            });
            
            // Handle new user connections
            socket.on('server:user:connected', (user) => {
                console.log('User connected:', user);
                addUserToList(user);
            });
            
            // Handle user disconnections
            socket.on('server:user:disconnected', (user) => {
                console.log('User disconnected:', user);
                removeUserMarker(user.userId);
                removeUserFromList(user.userId);
            });
            
            // Get initial users list
            socket.on('server:users:list', (users) => {
                console.log('Initial users list:', users);
                users.forEach(user => {
                    if (user.userId !== currentUser.userId) {
                        addUserToList(user);
                    }
                });
            });
        }
        
        function updateUserMarker(data) {
            const { userId, name, latitude, longitude } = data;
            
            // Don't create marker for current user
            if (userId === currentUser.userId) return;
            
            let marker = userMarkers.get(userId);
            
            if (!marker) {
                marker = L.marker([latitude, longitude])
                    .addTo(map)
                    .bindPopup(name || userId);
                userMarkers.set(userId, marker);
            } else {
                marker.setLatLng([latitude, longitude]);
            }
        }
        
        function removeUserMarker(userId) {
            const marker = userMarkers.get(userId);
            if (marker) {
                map.removeLayer(marker);
                userMarkers.delete(userId);
            }
        }
        
        function addUserToList(user) {
            const usersList = document.getElementById('usersList');
            let li = document.getElementById(`user-${user.userId}`);
            if (!li) {
                li = document.createElement('li');
                li.id = `user-${user.userId}`;
                li.textContent = user.name || user.email;
                usersList.appendChild(li);
            }
        }
        
        function removeUserFromList(userId) {
            const li = document.getElementById(`user-${userId}`);
            if (li) li.remove();
        }
        
        function updateStatus(message) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
        }
        
        async function startLocationTracking() {
            if (!navigator.geolocation) {
                alert('Geolocation is not supported by your browser');
                return;
            }
            
            // Send location immediately and then every 10 seconds

            locationInterval = setInterval(sendLocation, 10000);

        }

<body>
    <div id="appContainer">
        <div class="user-info" id="userInfo"></div>
        <div class="users-panel" id="usersPanel">
            <h4>Online Users</h4>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const AUTH_SERVER = 'http://localhost:8000';
        const TRACKER_SERVER = 'http://localhost:8001';
        
        let token = null;
        let socket = null;
        let map = null;
        let myMarker = null;
        let userMarkers = new Map();
        let locationInterval = null;
        let currentUser = null;
        
        // Check if we have a token in URL (from OAuth redirect)
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        
        if (code) {
            // Exchange code for token
            exchangeCodeForToken(code);
        } else {
            // Check if we have a stored token
            token = localStorage.getItem('access_token');
            if (token) {
                initApp();
            } else {
                redirectToAuth();
            }
        }
        
        async function exchangeCodeForToken(code) {
    try {
        const response = await fetch(`${AUTH_SERVER}/o/token`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                grant_type: 'authorization_code',
                shortCode: code,  // Make sure this matches your backend (shortCode)
                client_id: 'test_client_123',
                client_secret: 'test_secret_456',
                redirect_uri: window.location.origin
            })
        });
        
        const data = await response.json();
        console.log('Token response:', data); // Debug log
        
        // Note: Your backend returns 'accessTtoken' (typo)
        if (data.accessTtoken) {
            token = data.accessTtoken;
            localStorage.setItem('access_token', token);
            localStorage.setItem('refresh_token', data.refreshToken);
            window.history.replaceState({}, document.title, window.location.pathname);
            initApp();
        } else {
            console.error('No token in response:', data);
            redirectToAuth();
        }
    } catch (error) {
        console.error('Token exchange failed:', error);
        redirectToAuth();
    }
}
        
function redirectToAuth() {
            const redirectUri = encodeURIComponent(window.location.origin);
            window.location.href = `${AUTH_SERVER}/o/authenticate?client_id=test_client_123&redirect_uri=${redirectUri}&response_type=code`;
        }
        
        async function initApp() {
            try {
                // Decode token to get user info
                const payload = JSON.parse(atob(token.split('.')[1]));
                currentUser = {
                    userId: payload.sub,
                    email: payload.email,
                    name: payload.name || payload.given_name || payload.email
                };
                
                document.getElementById('userInfo').innerHTML = `
                    <strong>${currentUser.name}</strong><br>
                    <small>${currentUser.email}</small>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                `;
                
                updateStatus('Connected - Sharing location');
                
                // Initialize map
                map = L.map('map').setView([51.505, -0.09], 13);
                L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
                }).addTo(map);
                
                // Connect to socket server
                connectSocket();
                
                // Start location tracking
                startLocationTracking();
                
            } catch (error) {
                console.error('Failed to init app:', error);
                redirectToAuth();
            }
        }
        
        function connectSocket() {
            socket = io(TRACKER_SERVER, {
                auth: { token: token },
                transports: ['websocket', 'polling']
            });
            
            socket.on('connect', () => {
                console.log('Connected to tracker server');
                updateStatus('Connected - Sharing location');
            });
            
            socket.on('disconnect', () => {
                console.log('Disconnected from tracker server');
                updateStatus('Disconnected - Attempting to reconnect...');
            });
            
            socket.on('server:location:update', (data) => {
                console.log('Location update received:', data);
                updateUserMarker(data);
            });
            
            socket.on('server:user:connected', (user) => {
                console.log('User connected:', user);
                addUserToList(user);
            });
            
            socket.on('server:user:disconnected', (user) => {
                console.log('User disconnected:', user);
                removeUserMarker(user.userId);
                removeUserFromList(user.userId);
            });
            
            socket.on('server:users:list', (users) => {
                console.log('Initial users list:', users);
                users.forEach(user => {
                    if (user.userId !== currentUser.userId) {
                        addUserToList(user);
                    }
                });
            });
        }

        function updateUserMarker(data) {
    const { userId, name, email, latitude, longitude } = data;
    
    if (userId === currentUser.userId) return;
    
    let marker = userMarkers.get(userId);
    const displayName = name || email || userId;
    
    if (!marker) {
        marker = L.marker([latitude, longitude])
            .addTo(map)
            .bindPopup(displayName);
        userMarkers.set(userId, marker);
    } else {
        marker.setLatLng([latitude, longitude]);
        marker.getPopup().setContent(displayName);
    }
}

            const marker = userMarkers.get(userId);
            if (marker) {
                map.removeLayer(marker);
                userMarkers.delete(userId);
            }
        }
        
        function addUserToList(user) {
            const usersList = document.getElementById('usersList');
            let li = document.getElementById(`user-${user.userId}`);
            if (!li) {
                li = document.createElement('li');
                li.id = `user-${user.userId}`;
                li.textContent = user.name || user.email;
                usersList.appendChild(li);
            }
        }
        
        function removeUserFromList(userId) {
            const li = document.getElementById(`user-${userId}`);
            if (li) li.remove();
        }
        
        function updateStatus(message) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
        }
        
        async function startLocationTracking() {
            if (!navigator.geolocation) {
                alert('Geolocation is not supported by your browser');
                return;
            }
            
            await sendLocation();
            locationInterval = setInterval(sendLocation, 10000);
        }
        
        async function sendLocation() {
    try {
        const position = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 5000
            });
        });
        
        const { latitude, longitude } = position.coords;
        
        // Update my marker on map
        if (!myMarker) {
            myMarker = L.marker([latitude, longitude])
                .addTo(map)
                .bindPopup(`You are here<br>${currentUser.name || currentUser.email}`)
                .openPopup();
            map.setView([latitude, longitude], 15);
        } else {
            myMarker.setLatLng([latitude, longitude]);
        }
        
        // Send to server via socket with user info
        if (socket && socket.connected) {
            socket.emit('client:location:update', { 
                latitude, 
                longitude,
                email: currentUser.email,
                name: currentUser.name
            });
            updateStatus(`Location sent - ${new Date().toLocaleTimeString()}`);
        }
        
    } catch (error) {
        console.error('Error getting location:', error);
        updateStatus(`Location error: ${error.message}`);
    }
}
function logout() {
    console.log("LOg00000000ut");
    
    if (locationInterval) clearInterval(locationInterval);
    if (socket) socket.disconnect();
    localStorage.removeItem('access_token');
    localStorage.removeItem('refresh_token');
    
    // Redirect to auth server's logout or login page
     window.location.href = 'http://localhost:8000/authenticate.html';

}
