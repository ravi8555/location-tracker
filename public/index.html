            async function generatePKCE() {
  const array = new Uint8Array(32);
  crypto.getRandomValues(array);

  const code_verifier = btoa(String.fromCharCode(...array))
    .replace(/\+/g, "-")
    .replace(/\//g, "_")
    .replace(/=+$/, "");

  const encoder = new TextEncoder();
  const data = encoder.encode(code_verifier);
  const digest = await crypto.subtle.digest("SHA-256", data);

  const code_challenge = btoa(String.fromCharCode(...new Uint8Array(digest)))
    .replace(/\+/g, "-")
    .replace(/\//g, "_")
    .replace(/=+$/, "");

  return { code_verifier, code_challenge };
}


async function redirectToAuth() {
  const { code_verifier, code_challenge } = await generatePKCE();

  // store verifier
  localStorage.setItem("pkce_verifier", code_verifier);

  const redirectUri = encodeURIComponent(window.location.origin);

  window.location.href =
    `${AUTH_SERVER}/o/authenticate` +
    `?client_id=b0c741de0fb45c9560305c1331b7f36b` +
    `&redirect_uri=${redirectUri}` +
    `&response_type=code` +
    `&code_challenge=${code_challenge}` +
    `&code_challenge_method=S256`;
}
           async function exchangeCodeForToken(code) {
  try {
    const code_verifier = localStorage.getItem("pkce_verifier");
    if (!code_verifier) {
  return redirectToAuth(); // safety fallback
}

    const response = await fetch(`${AUTH_SERVER}/o/token`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      credentials: "include", // ✅ critical
      body: JSON.stringify({
        grant_type: "authorization_code",
        code: code,
        client_id: "b0c741de0fb45c9560305c1331b7f36b",
        redirect_uri: window.location.origin,
        code_verifier: code_verifier
      }),
    });

    if (!response.ok) {
      console.error("Token exchange failed");
      return redirectToAuth();
    }

    // clean URL
    window.history.replaceState({}, document.title, window.location.pathname);

    // cleanup PKCE
    localStorage.removeItem("pkce_verifier");

    // start app
    initApp();

  } catch (error) {
    console.error("Token exchange failed:", error);
    redirectToAuth();
  }
}
 async function initApp() {

currentUser = {

    console.error("Logout failed", err);
  }
}
